version: '3.8'

services:
  webhook:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/webhook/health"]
      interval: 30s
      timeout: 10s
      retries: 3
