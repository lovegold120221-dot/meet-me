<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orbit Conference</title>
  <script src='https://8x8.vc/vpaas-magic-cookie-b78ef1cd37804b878fe1c9d83b168da3/external_api.js'></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #000;
    }

    #jaas-container {
      height: 100%;
      width: 100%;
      border: none;
      outline: none;
      position: relative;
    }

    .logo-sidebar {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 10000;
      pointer-events: none;
    }

    .logo-sidebar img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 50%;
    }

    /* Translation Control Panel */
    .translation-panel {
      position: fixed;
      bottom: 20px;
      left: 20px;
      z-index: 10000;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: flex-start;
    }

    .translation-panel select {
      background: rgba(0, 0, 0, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 6px;
      color: #fff;
      padding: 8px 12px;
      font-size: 13px;
      min-width: 160px;
      cursor: pointer;
    }

    .translation-panel select option {
      background: #1a1a1a;
      color: #fff;
    }

    .translation-btn {
      background: #4CAF50;
      border: none;
      border-radius: 6px;
      color: #fff;
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .translation-btn:hover {
      background: #45a049;
    }

    .translation-btn.active {
      background: #f44336;
    }

    .translation-btn svg {
      width: 18px;
      height: 18px;
      fill: #fff;
    }

    .tts-status {
      position: fixed;
      bottom: 80px;
      left: 20px;
      z-index: 10000;
      background: rgba(0, 0, 0, 0.9);
      color: #fff;
      padding: 12px 16px;
      border-radius: 8px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
      max-width: 280px;
      display: none;
      pointer-events: none;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .tts-status.visible {
      display: block;
    }

    .tts-status .lang {
      color: #4CAF50;
      font-weight: 600;
    }
  </style>
  <script type="text/javascript">
    async function initJitsi() {
      console.log('🚀 Initializing Orbit Conference...');

      // Wait for Jitsi API to be available
      if (typeof JitsiMeetExternalAPI === 'undefined') {
        console.log('⏳ Waiting for Jitsi API...');
        await new Promise(resolve => setTimeout(resolve, 1000));
        if (typeof JitsiMeetExternalAPI === 'undefined') {
          console.error('❌ Jitsi API not loaded. Check if external_api.js loaded correctly.');
          document.querySelector('#jaas-container').innerHTML = `
            <div style="color: white; padding: 50px; text-align: center; font-family: sans-serif;">
              <h2>Failed to load Jitsi API</h2>
              <p>The video conferencing library could not be loaded.</p>
              <p>Please check your internet connection and refresh.</p>
            </div>
          `;
          return;
        }
      }

      const roomName = 'conference';
      const userName = 'Orbit User';
      const isModerator = true;
      const jaasDomain = '8x8.vc';

      try {
        console.log('📡 Fetching JWT token...');
        const apiUrl = window.location.hostname.includes('localhost')
          ? `/api/token?room=${roomName}&name=${encodeURIComponent(userName)}&moderator=${isModerator}`
          : `${window.location.origin}/api/token?room=${roomName}&name=${encodeURIComponent(userName)}&moderator=${isModerator}`;
        const response = await fetch(apiUrl);
        const data = await response.json();
        console.log('✅ Token received:', data.token ? 'Valid token' : 'No token');

        console.log('🎯 Loading Jitsi...');
        const api = new JitsiMeetExternalAPI(jaasDomain, {
          roomName: `vpaas-magic-cookie-b78ef1cd37804b878fe1c9d83b168da3/${roomName}`,
          jwt: data.token,
          parentNode: document.querySelector('#jaas-container'),
          width: '100%',
          height: '100%'
        });

        console.log('✅ Jitsi loaded successfully');

        // Listen for events
        api.addEventListener('videoConferenceJoined', () => {
          console.log('👤 Joined conference');
        });

        api.addEventListener('videoConferenceLeft', () => {
          console.log('👋 Left conference');
        });

        // Translation + TTS
        let translationEnabled = false;
        let currentAudio = null;
        let lastTranscript = '';

        // Translation controls
        const translationBtn = document.getElementById('translation-btn');
        const languageSelect = document.getElementById('target-language');
        const ttsStatus = document.getElementById('tts-status');
        const btnText = translationBtn.querySelector('span');

        // Toggle translation on/off
        translationBtn.addEventListener('click', () => {
          translationEnabled = !translationEnabled;
          translationBtn.classList.toggle('active', translationEnabled);

          if (translationEnabled) {
            btnText.textContent = 'Stop Translation';
            ttsStatus.innerHTML = `<span class="lang">🎧 Listening...</span> Select language: ${languageSelect.options[languageSelect.selectedIndex].text}`;
            ttsStatus.classList.add('visible');
            console.log('🎧 Translation enabled - listening for transcription');
          } else {
            btnText.textContent = 'Start Translation';
            ttsStatus.classList.remove('visible');
            if (currentAudio) {
              currentAudio.pause();
              currentAudio = null;
            }
            console.log('🛑 Translation disabled');
          }
        });

        // Capture transcription events from Jitsi
        api.addEventListener('transcriptionChunkReceived', (event) => {
          console.log('📝 Transcription chunk received:', event);

          // Only process if translation is enabled
          if (!translationEnabled || !event.data || !event.data.text) return;

          const text = event.data.text.trim();
          if (!text || text === lastTranscript) return;

          lastTranscript = text;
          const speaker = event.data.participantName || 'Speaker';
          const targetLang = languageSelect.value;

          // Show original transcription
          ttsStatus.innerHTML = `<span class="lang">📝 ${speaker}:</span> ${text.substring(0, 80)}${text.length > 80 ? '...' : ''}`;
          ttsStatus.classList.add('visible');

          // Send to backend for translation + TTS
          fetchTranslationTTS(text, speaker, targetLang);
        });

        // Translation + TTS function
        async function fetchTranslationTTS(text, speaker, targetLang) {
          try {
            const apiUrl = window.location.hostname.includes('localhost')
              ? '/api/tts'
              : `${window.location.origin}/api/tts`;

            console.log(`🌍 Translating to ${targetLang}: "${text.substring(0, 50)}..."`);

            const response = await fetch(apiUrl, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                text,
                speaker,
                sourceLang: 'auto',
                targetLang: targetLang || 'en'
              })
            });

            if (!response.ok) throw new Error('TTS request failed');

            const data = await response.json();

            if (data.audioUrl) {
              // Play audio
              if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
              }

              currentAudio = new Audio(data.audioUrl);
              currentAudio.play().catch(e => console.log('Audio play failed:', e));

              // Update status with translation
              if (data.translatedText) {
                ttsStatus.innerHTML = `
                  <span class="lang">📝 ${speaker}:</span> ${text.substring(0, 60)}...<br>
                  <span class="lang">🔊 Translated:</span> ${data.translatedText.substring(0, 60)}...
                `;
              }
            }
          } catch (error) {
            console.error('Translation/TTS error:', error);
          }
        }

      } catch (error) {
        console.error('❌ Failed to initialize meeting:', error);
        document.querySelector('#jaas-container').innerHTML = `
          <div style="color: white; padding: 50px; text-align: center; font-family: sans-serif;">
            <h2>Failed to load conference</h2>
            <p>Error: ${error.message}</p>
            <p>Please check the console for details.</p>
          </div>
        `;
      }
    }

    window.onload = initJitsi;
  </script>
</head>

<body>
  <div class="logo-sidebar">
    <img src="/logo-white.png" alt="Orbit Conference Logo"
      onerror="this.style.display='none'; console.log('Logo failed to load')">
  </div>

  <!-- Translation Panel -->
  <div class="translation-panel">
    <select id="target-language" title="Select translation language" aria-label="Select translation language">
      <option value="en">🇬🇧 English</option>
      <option value="nl">🇳🇱 Dutch (Flemish)</option>
      <option value="de">🇩🇪 German</option>
      <option value="fr">🇫🇷 French</option>
      <option value="es">🇪🇸 Spanish</option>
      <option value="it">🇮🇹 Italian</option>
      <option value="pt">🇵🇹 Portuguese</option>
      <option value="ja">🇯🇵 Japanese</option>
      <option value="zh">🇨🇳 Chinese</option>
      <option value="ko">🇰🇷 Korean</option>
      <option value="hi">🇮🇳 Hindi</option>
      <option value="ru">🇷🇺 Russian</option>
      <option value="ar">🇸🇦 Arabic</option>
      <option value="tr">🇹🇷 Turkish</option>
      <option value="pl">🇵🇱 Polish</option>
    </select>
    <button class="translation-btn" id="translation-btn">
      <svg viewBox="0 0 24 24">
        <path
          d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z" />
      </svg>
      <span>Start Translation</span>
    </button>
  </div>
  <div class="tts-status" id="tts-status"></div>

  <div id="jaas-container"></div>
</body>

</html>
