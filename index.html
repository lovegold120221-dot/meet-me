<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orbit Conference</title>
  <script src='https://8x8.vc/vpaas-magic-cookie-b78ef1cd37804b878fe1c9d83b168da3/external_api.js'></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #000;
    }

    #jaas-container {
      height: 100%;
      width: 100%;
      border: none;
      outline: none;
      position: relative;
    }

    .logo-sidebar {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 10000;
      pointer-events: none;
    }

    .logo-sidebar img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 50%;
    }

    /* TTS Speaker Toggle */
    .tts-toggle {
      position: fixed;
      bottom: 20px;
      left: 20px;
      z-index: 10000;
      background: rgba(0, 0, 0, 0.8);
      border: 2px solid #fff;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .tts-toggle:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .tts-toggle.active {
      background: #4CAF50;
      border-color: #4CAF50;
    }

    .tts-toggle svg {
      width: 24px;
      height: 24px;
      fill: #fff;
    }

    .tts-status {
      position: fixed;
      bottom: 80px;
      left: 20px;
      z-index: 10000;
      background: rgba(0, 0, 0, 0.9);
      color: #fff;
      padding: 12px 16px;
      border-radius: 8px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
      max-width: 280px;
      display: none;
      pointer-events: none;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .tts-status.visible {
      display: block;
    }

    .tts-status .lang {
      color: #4CAF50;
      font-weight: 600;
    }
  </style>
  <script type="text/javascript">
    async function initJitsi() {
      console.log('🚀 Initializing Orbit Conference...');

      // Wait for Jitsi API to be available
      if (typeof JitsiMeetExternalAPI === 'undefined') {
        console.log('⏳ Waiting for Jitsi API...');
        await new Promise(resolve => setTimeout(resolve, 1000));
        if (typeof JitsiMeetExternalAPI === 'undefined') {
          console.error('❌ Jitsi API not loaded. Check if external_api.js loaded correctly.');
          document.querySelector('#jaas-container').innerHTML = `
            <div style="color: white; padding: 50px; text-align: center; font-family: sans-serif;">
              <h2>Failed to load Jitsi API</h2>
              <p>The video conferencing library could not be loaded.</p>
              <p>Please check your internet connection and refresh.</p>
            </div>
          `;
          return;
        }
      }

      const roomName = 'conference';
      const userName = 'Orbit User';
      const isModerator = true;
      const jaasDomain = '8x8.vc';

      try {
        console.log('📡 Fetching JWT token...');
        const apiUrl = window.location.hostname.includes('localhost')
          ? `/api/token?room=${roomName}&name=${encodeURIComponent(userName)}&moderator=${isModerator}`
          : `${window.location.origin}/api/token?room=${roomName}&name=${encodeURIComponent(userName)}&moderator=${isModerator}`;
        const response = await fetch(apiUrl);
        const data = await response.json();
        console.log('✅ Token received:', data.token ? 'Valid token' : 'No token');

        console.log('🎯 Loading Jitsi...');
        const api = new JitsiMeetExternalAPI(jaasDomain, {
          roomName: `vpaas-magic-cookie-b78ef1cd37804b878fe1c9d83b168da3/${roomName}`,
          jwt: data.token,
          parentNode: document.querySelector('#jaas-container'),
          width: '100%',
          height: '100%'
        });

        console.log('✅ Jitsi loaded successfully');

        // Listen for events
        api.addEventListener('videoConferenceJoined', () => {
          console.log('👤 Joined conference');
        });

        api.addEventListener('videoConferenceLeft', () => {
          console.log('👋 Left conference');
        });

        // Transcription + TTS
        let ttsEnabled = false;
        let currentAudio = null;
        let lastTranscript = '';

        // TTS Toggle button
        const ttsToggle = document.getElementById('tts-toggle');
        const ttsStatus = document.getElementById('tts-status');

        ttsToggle.addEventListener('click', () => {
          ttsEnabled = !ttsEnabled;
          ttsToggle.classList.toggle('active', ttsEnabled);
          ttsStatus.textContent = ttsEnabled ? '🔊 TTS Active - Translation enabled' : '';
          ttsStatus.classList.toggle('visible', ttsEnabled);
          console.log('TTS:', ttsEnabled ? 'enabled' : 'disabled');
        });

        // Capture transcription events
        api.addEventListener('transcriptionChunkReceived', (event) => {
          console.log('📝 Transcription chunk:', event);

          if (!ttsEnabled || !event.data || !event.data.text) return;

          const text = event.data.text.trim();
          if (!text || text === lastTranscript) return;

          lastTranscript = text;
          const speaker = event.data.participantName || 'Speaker';

          // Show transcription
          ttsStatus.innerHTML = `<span class="lang">📝 ${speaker}:</span> ${text.substring(0, 100)}${text.length > 100 ? '...' : ''}`;
          ttsStatus.classList.add('visible');

          // Send to backend for translation + TTS
          fetchTranslationTTS(text, speaker);
        });

        // Translation + TTS function
        async function fetchTranslationTTS(text, speaker) {
          try {
            const apiUrl = window.location.hostname.includes('localhost')
              ? '/api/tts'
              : `${window.location.origin}/api/tts`;

            const response = await fetch(apiUrl, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                text,
                speaker,
                sourceLang: 'auto',
                targetLang: 'en' // Change this based on user preference
              })
            });

            if (!response.ok) throw new Error('TTS request failed');

            const data = await response.json();

            if (data.audioUrl) {
              // Play audio
              if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
              }

              currentAudio = new Audio(data.audioUrl);
              currentAudio.play().catch(e => console.log('Audio play failed:', e));

              // Update status with translation
              if (data.translatedText) {
                ttsStatus.innerHTML = `
                  <span class="lang">📝 ${speaker}:</span> ${text.substring(0, 60)}...<br>
                  <span class="lang">🔊 Translated:</span> ${data.translatedText.substring(0, 60)}...
                `;
              }
            }
          } catch (error) {
            console.error('Translation/TTS error:', error);
          }
        }

      } catch (error) {
        console.error('❌ Failed to initialize meeting:', error);
        document.querySelector('#jaas-container').innerHTML = `
          <div style="color: white; padding: 50px; text-align: center; font-family: sans-serif;">
            <h2>Failed to load conference</h2>
            <p>Error: ${error.message}</p>
            <p>Please check the console for details.</p>
          </div>
        `;
      }
    }

    window.onload = initJitsi;
  </script>
</head>

<body>
  <div class="logo-sidebar">
    <img src="/logo-white.png" alt="Orbit Conference Logo"
      onerror="this.style.display='none'; console.log('Logo failed to load')">
  </div>

  <!-- TTS Toggle -->
  <div class="tts-toggle" id="tts-toggle" title="Toggle Translation TTS">
    <svg viewBox="0 0 24 24">
      <path
        d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" />
    </svg>
  </div>
  <div class="tts-status" id="tts-status"></div>

  <div id="jaas-container"></div>
</body>

</html>
