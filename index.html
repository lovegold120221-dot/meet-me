            localStorage.setItem('targetLanguage', lang);
            console.log('Language changed to:', lang);
        }

        window.onload = () => {
            api = new JitsiMeetExternalAPI("8x8.vc", {
                roomName: "vpaas-magic-cookie-b78ef1cd37804b878fe1c9d83b168da3/SampleAppNativeChemicalsPowerWhen",
                parentNode: document.querySelector('#jaas-container')
            });
            
            const savedLang = localStorage.getItem('targetLanguage');
            if (savedLang) {
                document.getElementById('language-select').value = savedLang;
            }
        };
