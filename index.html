          participantId: data.participantId,
          participantName: data.participantName,
          text: data.text
        };
        transcriptions.push(entry);
        console.log('Transcription:', entry);
      });

      // Save transcription to file
      window.saveTranscription = () => {
        const blob = new Blob([JSON.stringify(transcriptions, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `transcription-${new Date().toISOString().slice(0, 10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
      };

      // Auto-save every 30 seconds
      setInterval(() => {
        if (transcriptions.length > 0) {
          localStorage.setItem('orbit-transcription', JSON.stringify(transcriptions));
        }
      }, 30000);

      // Auto-start transcription when moderator joins
      let transcriptionStarted = false;

      api.addEventListener('participantRoleChanged', (event) => {
        if (event.role === 'moderator' && !transcriptionStarted) {
          transcriptionStarted = true;
          // Start closed captions/transcription
          api.executeCommand('toggleSubtitles');
          console.log('Auto-started transcription as moderator');
        }
      });

      // Alternative: try starting when video conference is joined
      api.addEventListener('videoConferenceJoined', () => {
        setTimeout(() => {
          if (!transcriptionStarted) {
            api.executeCommand('toggleSubtitles');
            transcriptionStarted = true;
            console.log('Auto-started transcription on join');
